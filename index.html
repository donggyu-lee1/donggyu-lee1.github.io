<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donggyu Lee</title>
    <meta
      name="description"
      content="Donggyu Lee is an M.S. student in Data Science at KAIST working on machine learning for economics and finance, computational social science, and satellite imagery."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <div class="page-glow page-glow-a" aria-hidden="true"></div>
    <div class="page-glow page-glow-b" aria-hidden="true"></div>

    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="#top">Donggyu Lee</a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
        </button>
        <nav id="site-nav" class="site-nav" aria-label="Primary">
          <a href="#about">About</a>
          <a href="#research">Research</a>
          <a href="#publications">Publications</a>
          <a href="#experience">Experience</a>
          <a href="#cv">CV</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main id="top">
      <section class="hero">
        <div class="shell hero-grid">
          <div class="hero-copy">
            <div id="hero-content"></div>
          </div>

          <figure class="hero-photo-card">
            <div class="hero-photo-frame">
              <img
                src="./assets/profile.jpg"
                alt="Portrait of Donggyu Lee"
                class="hero-photo"
              />
            </div>
            <figcaption id="hero-caption"></figcaption>
          </figure>
        </div>
      </section>

      <section id="about" class="section">
        <div class="shell section-grid">
          <div class="section-heading" id="about-heading"></div>
          <div class="section-content prose" id="about-content"></div>
        </div>
      </section>

      <section id="research" class="section section-accent">
        <div class="shell">
          <div class="section-heading narrow" id="research-heading"></div>
          <div class="interest-grid" id="research-cards"></div>
        </div>
      </section>

      <section id="publications" class="section">
        <div class="shell">
          <div class="section-heading narrow">
            <p class="section-kicker">Publications</p>
            <h2>Selected papers</h2>
          </div>

          <div class="publication-column publication-column-single">
            <div class="column-header">
              <h3>Publications and Working Papers</h3>
              <span class="column-count" id="publications-count">0</span>
            </div>
            <div id="publications-list" class="publication-list"></div>
          </div>
        </div>
      </section>

      <section id="experience" class="section section-accent">
        <div class="shell">
          <div class="section-heading narrow" id="experience-heading"></div>
          <div class="experience-grid" id="experience-grid"></div>
        </div>
      </section>

      <section id="cv" class="section">
        <div class="shell">
          <div class="cv-card" id="cv-card"></div>
        </div>
      </section>
    </main>

    <footer id="contact" class="site-footer">
      <div class="shell footer-grid">
        <div id="contact-content"></div>
        <div class="footer-links" id="footer-links"></div>
      </div>
      <div class="shell footer-bottom">
        <span>&copy; <span id="current-year"></span> Donggyu Lee</span>
        <span id="footer-note">Built for GitHub Pages</span>
      </div>
    </footer>
  </body>
</html>
